<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007AFF">
    <title>✨͕͐进͕͐入͕͐猫͕͐次͕͐元͕͐🐈͕͐</title>

<style>
:root {
    --glow-sens: 30;
    --dark: hsl(260, 25%, 10%);
    --fg: white;
    --h: 260;
    --card-bg: linear-gradient(8deg, var(--dark) 75%, color-mix(in hsl, var(--dark), white 2.5%) 75.5%);
    --blend: soft-light;
    --glow-blend: plus-lighter;
    --glow-color: 40deg 80% 80%;
    --duration: 1s;
    --ease-slider: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-timeline: cubic-bezier(0.71, 0.21, 0.3, 0.95);
    --page-height: 600px;
    --accent: hsl(260, 100%, 80%);
    
    --glowing-card-bg: rgb(255 255 255 / 15%);
    --glowing-card-border: rgb(255 255 255 / 70%);
    --glowing-card-backdrop: none;
    
    --link-card-bg: rgb(255 255 255 / 11%);
    --link-card-hover-bg: rgb(255 255 255 / 25%);
    --link-card-border: rgb(255 255 255 / 40%);
    --link-card-box-shadow: 0px 4px 3px #0001, 0 0 35px #fffa inset;
    
    --spotify-card-bg: rgb(255 255 255 / 17%);
    --spotify-card-border: rgb(255 255 255 / 45%);
    --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
    
    --music-player-bg: rgb(255 255 255 / 15%);
    --music-player-shadow: none;
}

.light {
    --card-bg: linear-gradient(8deg, color-mix(in hsl, hsl(260, 25%, 95%), var(--dark) 2.5%) 75%, hsl(260, 25%, 95%) 75.5%);
    --blend: darken;
    --glow-blend: luminosity;
    --glow-color: 280deg 90% 95%;
    
    --glowing-card-bg: rgb(255 255 255 / 13%);
    --glowing-card-border: rgb(255 255 255 / 80%);
    --glowing-card-backdrop: blur(6px);
    
    --link-card-bg: rgb(255 255 255 / 7%);
    --link-card-hover-bg: rgb(255 255 255 / 25%);
    --link-card-border: rgb(255 255 255 / 45%);
    --link-card-box-shadow: 0px 4px 3px #0001, 0 0 25px #fffa inset;
    
    --spotify-card-bg: rgb(255 255 255 / 7%);
    --spotify-card-border: rgb(255 255 255 / 40%);
    --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
    
    --music-player-bg: rgb(255 255 255 / 10%);
    --music-player-shadow: 0 2px 6px 1px #0000001f;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    background: black;
    overflow: auto;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: -1;
}

#shuicheCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    pointer-events: none;
}

.alist-widget-wrapper {
    z-index: 1;
    box-sizing: border-box;
    width: 100%;
    height: auto;
    padding: 20px;
}

.glowing-card {
    position: relative;
    isolation: isolate;
    box-sizing: border-box;
    width: 345px !important;
    height: 510px !important;
    margin: 0 auto;
    text-align: center;
    background: #fff2;
    border: 1px solid var(--glowing-card-border);
    border-radius: 20px;
    box-shadow: 0px 0px 0px rgba(0, 0, 0, 0), 0 0 65px #fff inset;
    backdrop-filter: blur(35px);
    overflow: hidden;
    transform: translate3d(0, 0, 0.01px);
}

.profile-pic {
    width: 200px;
    height: 200px;
    margin: -45px auto;
    filter: brightness(0.88);
}

.pages {
    display: flex;
    height: auto;
    transform: translateX(-100%);
    transition: transform 0.5s ease-in-out;
}

.page {
    display: flex;
    flex-direction: column;
    flex: 0 0 100%;
    box-sizing: border-box;
    height: auto;
    padding: 0 28px 26px;
    overflow: hidden;
}

#page1 {
    padding-right: 0;
    padding-left: 0;
}

.page-vertical {
    width: 100%;
    height: 500px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.page-vertical::-webkit-scrollbar {
    display: none;
}

.subpage {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    padding-bottom: 10px;
    gap: 6px;
    scroll-snap-align: start;
}

.subpage img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 16px;
}

#page1-1 {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0px;
    cursor: pointer;
}

#page1-2 img {
    margin-top: 10px;
}

.theme-toggle,
.day-toggle {
    position: absolute;
    z-index: 10;
    width: 24px;
    height: 24px;
    opacity: 0.5;
    cursor: pointer;
    transition: opacity 0.3s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
}

.theme-toggle { top: 6px; }
.day-toggle { bottom: 5px; }

.theme-toggle:hover,
.day-toggle:hover { opacity: 0.7; }

.sun-toggle,
.day-toggle-left {
    left: 6px;
    transition: transform 0.1s ease;
}

.sun-toggle:hover,
.day-toggle-left:hover { transform: scale(1.2); }

.moon-toggle,
.day-toggle-right { right: 6px; }

svg.theme-toggle,
svg.day-toggle {
    color: var(--fg);
    fill: none;
    background: transparent;
    transition: color 0.8s ease-in-out, opacity 0.3s, transform 0.1s ease;
}

.link-card,
.spotify-card {
    align-items: center;
    width: 100%;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

.link-card {
    display: flex;
    max-width: 270px;
    height: 44px;
    padding: 8px;
    color: var(--fg);
    font-size: 16px;
    font-style: italic;
    text-decoration: none;
    background: var(--link-card-bg);
    border: 1px solid var(--link-card-border);
    border-radius: 20px;
    box-shadow: var(--link-card-box-shadow);
    transition: background 0.3s;
}

.link-card:hover {
    color: #333;
    background: rgba(255, 255, 255, 0.36);
}

.link-icon {
    width: 36px;
    height: 36px;
    margin-left: 18px;
}

.link-title {
    flex: 1;
    color: var(--fg);
    font-size: 18px;
    text-align: center;
}

.spotify-card {
    display: flex;
    flex-wrap: nowrap;
    justify-content: space-between;
    position: relative;
    max-width: 245px;
    height: 80px;
    margin: 0 auto 4px;
    padding: 10.8px 20px;
    gap: 16px;
    background: var(--spotify-card-bg);
    border: 1.5px solid var(--spotify-card-border);
    border-radius: 25px;
    box-shadow: var(--spotify-card-box-shadow);
    transition: all 0.2s ease;
}

.spotify-left {
    display: flex;
    flex-direction: column;
    flex: 0 1 auto;
    justify-content: flex-start;
    min-width: 0;
    height: auto;
    margin-left: 0px;
    padding-right: 0px;
    gap: 6px;
}

.spotify-meta {
    display: flex;
    align-items: center;
    gap: 6px;
}

.spotify-icon {
    display: flex;
    flex-shrink: 0;
    justify-content: center;
    align-items: center;
    width: 36px;
    height: 36px;
    background-color: #1ed760;
    border-radius: 12px;
}

.spotify-icon img {
    width: 22px;
    height: 22px;
}

.track-text {
    display: flex;
    flex-direction: column;
    gap: 0px;
    text-align: left;
}

.track-title {
    margin: 0;
    color: var(--fg);
    font-weight: bold;
    font-size: 16px;
    font-style: italic;
}

.track-artist {
    color: var(--fg);
    font-size: 12.5px;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.play-btn {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    width: fit-content;
    margin-top: 1px;
    padding: 6px 36px;
    gap: 6px;
    color: white;
    font-weight: bold;
    font-size: 14px;
    font-style: italic;
    background-color: #3fd97a;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    transition: transform 0.1s ease;
}

.play-btn:hover {
    transform: scale(1.05);
}

.play-btn svg {
    width: 14px;
    height: 14px;
}

.spotify-cover {
    flex-shrink: 0;
    width: 75px;
    height: 75px;
    margin-left: 10px;
    border-radius: 12px;
    overflow: hidden;
}

.spotify-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.reward-img-container {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    width: 100%;
    height: 85%;
}

.reward-img-container img {
    position: absolute;
    top: 4%;
    left: 50%;
    max-width: 100%;
    max-height: 95%;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    object-fit: contain;
    transform: translateX(-50%);
    transition: opacity 0.8s ease;
}

.reward-text-container {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    width: 100%;
    height: 35px;
}

#text-original,
#text-new {
    position: absolute;
    transition: opacity 0.5s ease;
}

#text-original {
    margin-top: -10px;
}

#text-new {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -55px;
    gap: 3px;
    opacity: 0;
    pointer-events: none;
}

.coffee-text {
    color: var(--fg);
    font-size: 24px;
    font-style: italic;
    text-decoration: underline;
    text-underline-offset: 5px;
    transition: color 6s ease-in-out;
}

.qr-text {
    color: var(--fg) !important;
    font-size: 24px !important;
    font-style: italic;
    text-decoration: underline;
    text-underline-offset: 5px;
    cursor: pointer;
    transition: opacity 0.2s;
}

.qr-text:hover {
    opacity: 0.9;
}

#reward-qr {
    opacity: 0;
    pointer-events: none;
}

#page1-1.show-qr #neko-gif,
#page1-1.show-qr #text-original {
    opacity: 0;
    pointer-events: none;
}

#page1-1.show-qr #reward-qr,
#page1-1.show-qr #text-new {
    opacity: 1;
    pointer-events: auto;
}

.pagination {
    display: flex;
    justify-content: center;
    position: absolute;
    bottom: 5px;
    left: 50%;
    margin-top: -8px;
    margin-bottom: 10px;
    gap: 5px;
    transform: translateX(-50%);
}

.bullet {
    position: relative;
    width: 85px;
    height: 6px;
    background: var(--fg);
    border-radius: 10%;
    opacity: 0.2;
    cursor: pointer;
    transition: all 0.3s;
}

.bullet::before {
    content: '';
    position: absolute;
    top: -15px;
    right: -5px;
    bottom: -15px;
    left: -5px;
    z-index: 10;
}

.bullet.active {
    background: #c299ff;
    border-radius: 10%;
    box-shadow: 0px 0px 20px rgba(194, 153, 255, 5);
    opacity: 1;
}

.lazy-placeholder { background-color: rgba(255, 255, 255, 0.1); }
.img { display: block; flex-shrink: 0; width: 100%; object-fit: cover; }
.list { margin: 0; padding: 0; list-style-type: none; }
.text_trsf-cap { text-transform: capitalize; }
.button { all: unset; cursor: pointer; }
.center { display: flex; justify-content: center; align-items: center; }
.flex-row { display: flex; }
.flex-column { display: flex; flex-direction: column; }
._align_center { align-items: center; }
._align_start { align-items: flex-start; }
._align_end { align-items: flex-end; }
._justify_center { justify-content: center; }
._justify_start { justify-content: flex-start; }
._justify_end { justify-content: flex-end; }
._justify_space-btwn { justify-content: space-between; }
.flex-row._justify_space-btwn { display: flex; justify-content: space-between; align-items: center; width: 100%; }

.text_overflow {
    display: inline-block;
    width: 66%;
    margin-right: 100px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.link-title,
.track-title,
.track-artist,
.coffee-text,
.qr-text,
.music-player,
.loading-text,
.music-player__subtitle,
.music-player__song-duration {
    transition: color 0.8s ease-in-out !important;
}

@font-face {
    font-family: "icomoon";
    font-weight: normal;
    font-style: normal;
    font-display: block;
    src: url("https://cdn.jsdelivr.net/gh/qxx2000/blog@main/fonts/icomoon.eot?u8ckod#iefix") format("embedded-opentype"),
         url("https://cdn.jsdelivr.net/gh/qxx2000/blog@main/fonts/icomoon.woff?u8ckod") format("woff");
}

[class^="icon-"],
[class*=" icon-"] {
    font-family: "icomoon" !important;
    font-weight: normal;
    font-style: normal;
    font-variant: normal;
    line-height: 1;
    text-transform: none;
    speak: never;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.icon-back:before { content: "\e900"; color: #827d7b; }
.icon-next:before { content: "\e901"; color: #827d7b; }
.icon-pause:before { content: "\e902"; color: #fff; }
.icon-play:before { content: "\e903"; color: #fff; }
.icon-playlist:before { content: "\e904"; color: #fff; }

.music-player {
    --color-white: #fff;
    --color-gray: #e5e7ea;
    --color-blue: #78adfe;
    --color-blue-dark: #5781bd;
    --box-shadow: 0 2px 6px 1px #0000001f;
    --color-text-1: var(--fg);
    --color-text-2: #0000006b;
    --cover-size: 4.2em;
    --border-radius: 1.2em;
    --music-player-height: calc(var(--page-height) - 0px);
    --offset-cover: 1em;
    
    width: 335px;
    height: 445px !important;
    margin-top: 30px;
    color: var(--color-text-1);
    background-color: rgba(255, 255, 255, 0.15);
    border-radius: var(--border-radius);
    box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    user-select: none;
}

body:not(.light) .music-player { --color-text-2: #ffffff6b; }

.slider {
    --shadow-opacity: 1;
    position: relative;
    z-index: 0;
    flex-shrink: 0;
    height: 6.8em;
    border-radius: inherit;
    transition: var(--duration) height var(--ease-timeline);
}

.slider.resize {
    --shadow-opacity: 0;
    height: var(--music-player-height);
}

.slider::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    left: 0;
    z-index: -1;
    width: 100%;
    height: 100%;
    border-radius: inherit;
    box-shadow: var(--box-shadow);
    opacity: var(--shadow-opacity);
    pointer-events: none;
    transition: var(--duration) opacity;
}

.slider__content {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--cover-size);
    height: var(--cover-size);
    border-radius: inherit;
    overflow: hidden;
    transform: translate3d(var(--offset-cover), var(--offset-cover), 0);
    transition: transform, width, height;
    transition-duration: var(--duration);
    transition-timing-function: var(--ease-timeline);
}

.slider.resize .slider__content {
    width: 100%;
    height: 22em;
    transform: translate3d(0, 0, 0);
}

.slider__content .button {
    --size: 2.5em;
    position: absolute;
    z-index: 1;
    width: var(--size);
    height: var(--size);
}

.slider__content i {
    position: absolute;
    font-size: var(--size);
    pointer-events: none;
}

.music-player__playlist-button {
    top: 5.5%;
    left: 5.5%;
    transform: scale(0);
    transition: calc(var(--duration) / 2) transform;
}

.slider.resize .music-player__playlist-button {
    transform: scale(1);
    transition: 0.30s var(--duration) transform cubic-bezier(0, 0.85, 0.11, 1.64);
}

.music-player__broadcast-guarantor {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.music-player__broadcast-guarantor .icon-pause,
.music-player__broadcast-guarantor.click .icon-play { opacity: 0; }
.music-player__broadcast-guarantor.click .icon-pause { opacity: 1; }

.slider__imgs {
    width: 100%;
    height: 100%;
    filter: brightness(75%);
    transform: translate3d(calc(var(--index) * 100%), 0, 0);
    transition: var(--duration) transform var(--ease-slider);
}

.slider__imgs > img { pointer-events: none; }

.slider__controls {
    --controls-y: 130%;
    --controls-x: 17.3%;
    --controls-width: 68.4%;
    --controls-resize-width: 88%;
    
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    position: absolute;
    width: var(--controls-width);
    padding-top: 0.375em;
    gap: 0.375em 0;
    transform: translate3d(var(--controls-x), 0, 0);
    animation: var(--controls-animate, "down paused") var(--duration) var(--ease-timeline) forwards;
}

@keyframes down {
    100% { width: var(--controls-resize-width); transform: translate3d(0, var(--controls-y), 0); }
}

@keyframes up {
    0% { width: var(--controls-resize-width); transform: translate3d(0, var(--controls-y), 0); }
    100% { width: var(--controls-width); transform: translate3d(var(--controls-x), 0, 0); }
}

.slider__switch-button {
    height: max-content;
    font-size: 2.5em;
}

.music-player__info {
    width: 56.3%;
    padding: 0 0.0625em;
    font-weight: bold;
    line-height: 1.45;
    white-space: nowrap;
    overflow: hidden;
    cursor: pointer;
}

.music-player__info > * {
    margin: 0 auto;
    pointer-events: none;
}

.music-player__singer-name {
    width: max-content;
    font-size: 1.1em;
}

.music-player__subtitle {
    color: var(--color-text-2);
    font-weight: bold;
    font-size: 0.8em;
}

.slider__controls .music-player__subtitle { width: max-content; }

.music-player__singer-name.animate,
.music-player__subtitle.animate {
    --subtitle-gap: 1.2em;
    display: flex;
    gap: 0 var(--subtitle-gap);
    animation: subtitle 12s 1.2s linear infinite;
}

@keyframes subtitle {
    80%, 100% { transform: translate3d(calc((100% + var(--subtitle-gap)) / -2), 0, 0); }
}

.progress {
    position: relative;
    top: 8px;
    width: 90%;
    height: 0.6em;
    cursor: pointer;
    transition: var(--duration) width var(--ease-timeline);
}

.slider.resize .progress { width: 100%; }

.progress__wrapper {
    position: relative;
    width: 100%;
    height: 0.35em;
    background-color: var(--color-gray);
    border-radius: 1em;
}

.progress__bar {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    width: var(--width);
    background-color: var(--color-blue);
    border-radius: inherit;
}

.progress__bar::after {
    --size: 0.375em;
    content: "";
    position: absolute;
    left: 98%;
    width: var(--size);
    height: var(--size);
    background-color: var(--color-blue-dark);
    border-radius: 100%;
}

.music-player__playlist {
    box-sizing: border-box;
    height: calc(100% - 6.8em);
    padding: 10px 0.9em 0 var(--offset-cover) !important;
    overflow-y: auto;
}

.music-player__song {
    --gap: 0.5em;
    margin-bottom: var(--gap);
    padding-bottom: var(--gap);
    border-bottom: 0.8px solid #d8d8d859;
    cursor: pointer;
}

.music-player__song audio { display: none; }

.music-player__song-img {
    width: var(--cover-size);
    height: var(--cover-size);
    margin-right: 12px;
    border-radius: var(--border-radius);
}

.music-player__playlist-info {
    width: 100%;
    margin-left: 1.2em;
    font-size: 1em;
    line-height: 1.2;
    overflow: hidden;
}

.music-player__playlist-info b {
    display: block;
    width: calc(100% - 50px);
    margin-left: 0;
    padding-left: 0;
    text-align: left;
}

.music-player__playlist-info .music-player__subtitle {
    display: block;
    flex-grow: 1;
    margin-left: 0;
    padding-left: 0;
    text-align: left;
}

.music-player__song-duration {
    position: relative;
    left: -15px;
    color: var(--color-text-2);
    font-weight: bold;
    font-size: 0.8em;
}

.loading-spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top-color: var(--fg);
    border-radius: 50%;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    margin-top: 10px;
    color: var(--fg);
    font-size: 16px;
}
</style>
</head>

<body>
    <canvas id="shuicheCanvas"></canvas>
    <div class="alist-widget-wrapper">
        <div class="glowing-card">

        `;
        if (isPureColor) { ghostLayer.style.background = newBgUrl; } 
        else { ghostLayer.style.backgroundImage = `url('${newBgUrl}')`; }
        document.body.prepend(ghostLayer);
        void ghostLayer.offsetWidth;
        ghostLayer.style.opacity = '1';
        setTimeout(() => {
            if (isPureColor) { document.body.style.background = newBgUrl; } 
            else { document.body.style.background = `url('${newBgUrl}') center/cover fixed`; }
            currentBgRecord = newBgUrl;
            ghostLayer.remove();
        }, 800);
    }

    /* ====================================================================*/
      
    function initThreeJS() {
        geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6 * count), 3));
        geometry.setAttribute('velocity', new THREE.BufferAttribute(new Float32Array(2 * count), 1));
        position = geometry.getAttribute('position');
        positionArray = position.array;
        velocity = geometry.getAttribute('velocity');
        velocityArray = velocity.array;
        
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 1, 500);
        camera.position.z = 200;
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        for (let i = 0; i < count; i++) {
            const x = Math.random() * 800 - 400;
            const y = Math.random() * 800 - 400;
            const z = Math.random() * 400 - 200;
            positionArray[6 * i] = x; positionArray[6 * i + 1] = y; positionArray[6 * i + 2] = z;
            positionArray[6 * i + 3] = x; positionArray[6 * i + 4] = y; positionArray[6 * i + 5] = z;
            velocityArray[2 * i] = 0; velocityArray[2 * i + 1] = 0;
        }
        
        const material = new THREE.LineBasicMaterial({ color: 0xffffff });
        const lines = new THREE.LineSegments(geometry, material);
        scene.add(lines);
        
        window.addEventListener('resize', resizeThreeJS, false);
        document.body.addEventListener('pointermove', onPointerMove);
        animeThreeJS();
    }

    function resizeThreeJS() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        windowHalfX = window.innerWidth / 2;
        windowHalfY = window.innerHeight / 2;
    }

    function animeThreeJS() {
        if (!isAnimating) return;
        for (let i = 0; i < count; i++) {
            velocityArray[2 * i] += 0.015;
            velocityArray[2 * i + 1] += 0.015;
            positionArray[6 * i + 2] += velocityArray[2 * i] + 0.03;
            positionArray[6 * i + 5] += velocityArray[2 * i + 1];
            if (positionArray[6 * i + 2] > 200) {
                const z = Math.random() * 200 - 200;
                positionArray[6 * i + 2] = z;
                positionArray[6 * i + 5] = z;
                velocityArray[2 * i] = 0;
                velocityArray[2 * i + 1] = 0;
            }
        }
        position.needsUpdate = true;
        renderThreeJS();
        animationFrameId = requestAnimationFrame(animeThreeJS);
    }

    function renderThreeJS() {
        if (!camera || !renderer) return;
        camera.position.x += (-mouseX * 0.1 - camera.position.x) * 0.02;
        camera.position.y += (-mouseY * 0.1 - camera.position.y) * 0.02;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
    }

    function onPointerMove(event) {
        mouseX = event.clientX - windowHalfX;
        mouseY = event.clientY - windowHalfY;
    }

        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') { savePlaybackState(); } });

            if (!selectedSong) return;
            const playbackState = { currentSongIndex: indexSong, isPlaying: !selectedSong.paused, volume: selectedSong.volume, currentTime: selectedSong.currentTime };
            localStorage.setItem('musicPlayerState', JSON.stringify(playbackState));
        }
        function restorePlaybackState() {
            try {
                const savedState = localStorage.getItem('musicPlayerState');

                    indexSong = playbackState.currentSongIndex;

                    }
                }
            } catch (e) { console.error("Error restoring playback state:", e); }
        }
        mainAudio.addEventListener('pause', savePlaybackState);
        mainAudio.addEventListener('ended', savePlaybackState);
        window.addEventListener('beforeunload', savePlaybackState);

        function handleChangeMusic({ isPrev = false, playListIndex = null }) {
            if (isLocked) return;
            let newIndex;
            if (playListIndex || playListIndex === 0) { newIndex = playListIndex; } 
            else { newIndex = isPrev ? (indexSong - 1) : (indexSong + 1); }
            if (newIndex < 0) { newIndex = songsLength; } 
            else if (newIndex > songsLength) { newIndex = 0; }
            if (newIndex === indexSong) return;
            mainAudio.pause();
            indexSong = newIndex;
            if (songIsPlayed) {
                mainAudio.src = songs[indexSong].files.song;
                mainAudio.load();
                mainAudio.addEventListener('loadedmetadata', () => {
                    mainAudio.play().catch(e => console.log("Play failed:", e));
                    savePlaybackState();
                    preloadNextSong();

            } else {
                mainAudio.removeAttribute('src');
                setProperty(progressBar_elmnt, "--width", "0%");
                delete mainAudio.dataset.savedTime;

            updateInfo(singerName_elmnt, songs[indexSong].artist);

        function handlePlayMusic() {

                    if (mainAudio.dataset.savedTime) { mainAudio.currentTime = parseFloat(mainAudio.dataset.savedTime); delete mainAudio.dataset.savedTime; }

            navigator.mediaSession.setActionHandler('previoustrack', () => handleChangeMusic({ isPrev: true }));
            navigator.mediaSession.setActionHandler('nexttrack', () => handleChangeMusic({ isPrev: false }));
            navigator.mediaSession.setActionHandler('play', () => {
                if (mainAudio.paused) {
                    if (!mainAudio.getAttribute('src')) { document.querySelector('.music-player__broadcast-guarantor').click(); } 
                    else { mainAudio.play(); broadcastGuarantor_elmnt.classList.add("click"); songIsPlayed = true; }

                if (!mainAudio.paused) { mainAudio.pause(); broadcastGuarantor_elmnt.classList.remove("click"); songIsPlayed = false; }
            });
            navigator.mediaSession.setActionHandler('seekto', (details) => {
                if (details.seekTime != null && mainAudio.getAttribute('src')) {
                    if (details.fastSeek && 'fastSeek' in mainAudio) { mainAudio.fastSeek(details.seekTime); } 
                    else { mainAudio.currentTime = details.seekTime; }
                }
            });
        }

        function controlSubtitleAnimation(parent, child) {
            if (child.classList.contains("animate")) return;
            const element = child.firstChild;
            if (child.clientWidth > parent.clientWidth) { child.appendChild(element.cloneNode(true)); child.classList.add("animate"); }
            setProperty(child.parentElement, "width", `${element.clientWidth}px`);
        }
        function setProperty(target, prop, value = "") { target.style.setProperty(prop, value); }
        function updateInfo(target, value) {
            while (target.firstChild) { target.removeChild(target.firstChild); }
            const targetChild_elmnt = document.createElement("div"); targetChild_elmnt.appendChild(document.createTextNode(value));
            target.appendChild(targetChild_elmnt); target.classList.remove("animate");
            controlSubtitleAnimation(musicPlayerInfo_elmnt, target);
        }
        function handleResize() { const vH = window.innerHeight * 0.01; setProperty(document.documentElement, "--vH", `${vH}px`); }
        handleResize();
        window.addEventListener("resize", handleResize); window.addEventListener("orientationchange", handleResize);
        window.addEventListener("transitionstart", ({ target }) => { if (target === sliderImgs_elmnt) { isLocked = true; setProperty(sliderImgs_elmnt, "will-change", "transform"); } });
        window.addEventListener("transitionend", ({ target, propertyName }) => {
            if (target === sliderImgs_elmnt) { isLocked = false; setProperty(sliderImgs_elmnt, "will-change", "auto"); }
            if (target.classList.contains("slider") && propertyName === "height") {
                controlSubtitleAnimation(musicPlayerInfo_elmnt, songName_elmnt); controlSubtitleAnimation(musicPlayerInfo_elmnt, singerName_elmnt);
            }
        });
        window.addEventListener("pointerup", (e) => { e.preventDefault(); if (progressBarIsUpdating) { selectedSong.muted = false; progressBarIsUpdating = false; } });
        window.addEventListener("pointermove", (e) => { if (progressBarIsUpdating) { e.preventDefault(); handleScrub(e); selectedSong.muted = true; } });
        window.addEventListener("touchend", (e) => { if (progressBarIsUpdating) { selectedSong.muted = false; progressBarIsUpdating = false; } });
        window.addEventListener("touchmove", (e) => { if (progressBarIsUpdating) { e.preventDefault(); handleScrub(e); selectedSong.muted = true; } });
    }
