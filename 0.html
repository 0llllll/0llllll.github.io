<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Power Effect</title>

<style>
/* ===== 基础样式 ===== */
html, body {
    background: #110b0b;
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
}

/* ===== 标题 ===== */
h1 {
    font-size: 20vw;
    margin: 0;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1::before,
h1::after {
    content: attr(data-heading);
    position: absolute;
    overflow: hidden;
    left: 0;
    top: 0;
    width: 100%;
    font-weight: normal;
}

/* ===== 主效果 ===== */
.power {
    font-family: 'FestivoLetters';
    text-shadow:
        -3px 3px 2px rgba(46, 37, 54, 0.5),
        -5px 5px 2px rgba(46, 37, 54, 0.5),
        -7px 7px 2px rgba(46, 37, 54, 0.5),
        -8px 8px 2px rgba(46, 37, 54, 0.5),
        -10px 10px 2px rgba(46, 37, 54, 0.5);
}

.power::before {
    font-family: 'FestivoLettersPattern', sans-serif;
    color: #a188ed;
    z-index: 2;
}

.power::after {
    color: #85cbd1;
    font-family: 'FestivoLetters09';
    z-index: 4;
}

/* ===== 动画（备用） ===== */
@keyframes rotatediv {
    10% { transform: rotate3d(0, 0, 0, 0); }
    50% { transform: rotate3d(3, 29, 0, 80deg); }
    100% { transform: rotate3d(0, 0, 0, 0); }
}

/* ===== 字体 ===== */
@font-face {
    font-family: 'FestivoLetters09';
    src: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/209981/335332_9_0.woff2') format('woff2');
}

@font-face {
    font-family: 'FestivoLetters';
    src: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/209981/335332_0_0.woff2') format('woff2');
}

@font-face {
    font-family: 'FestivoLettersPattern';
    src: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/209981/335332_4_0.woff2') format('woff2');
}
</style>
</head>

<body>

<h1 contenteditable data-heading="Power" class="power">Power</h1>

<script>
/* ===== 可编辑文字同步 ===== */
var h1 = document.querySelector("h1");

h1.addEventListener("input", function () {
    this.setAttribute("data-heading", this.innerText);
});


/* ===== Emoji 粒子效果 ===== */
(function emojiCursor() {

    var possibleEmoji = [
        "😊","🥺","💙","🥰","⭐","🌈","❤","🧡","<3",
        "💛","💚","💜","🏳️‍🌈","🏳️‍⚧️","⚧","⚢",
        "⌘","hi","^^",":)","(^◡^)","≧◠‿◠≦"
    ];

    var width = window.innerWidth;
    var height = window.innerHeight;

    var particles = [];

    function init() {
        bindEvents();
        loop();
    }

    function bindEvents() {
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('touchmove', onTouchMove);
        document.addEventListener('touchstart', onTouchMove);
        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        width = window.innerWidth;
        height = window.innerHeight;
    }

    function onTouchMove(e) {
        if (e.touches.length > 0) {
            for (var i = 0; i < e.touches.length; i++) {
                addParticle(
                    e.touches[i].clientX,
                    e.touches[i].clientY,
                    randomEmoji()
                );
            }
        }
    }

    function onMouseMove(e) {
        addParticle(
            e.clientX,
            e.clientY + window.pageYOffset,
            randomEmoji()
        );
    }

    function randomEmoji() {
        return possibleEmoji[Math.floor(Math.random() * possibleEmoji.length)];
    }

    function addParticle(x, y, character) {
        var particle = new Particle();
        particle.init(x, y, character);
        particles.push(particle);
    }

    function updateParticles() {
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].lifeSpan < 0) {
                particles[i].die();
                particles.splice(i, 1);
            }
        }
    }

    function loop() {
        requestAnimationFrame(loop);
        updateParticles();
    }

    /* ===== 粒子类 ===== */
    function Particle() {

        this.lifeSpan = 120;

        this.init = function (x, y, character) {
            this.velocity = {
                x: (Math.random() < 0.5 ? -1 : 1) * (Math.random() / 2),
                y: 1
            };

            this.position = {
                x: x - 10,
                y: y - 20
            };

            this.element = document.createElement('span');
            this.element.innerHTML = character;

            Object.assign(this.element.style, {
                position: "absolute",
                pointerEvents: "none",
                zIndex: "9999",
                fontSize: "16px",
                willChange: "transform"
            });

            document.body.appendChild(this.element);
        };

        this.update = function () {
            this.position.x += this.velocity.x;
            this.position.y += this.velocity.y;
            this.lifeSpan--;

            this.element.style.transform =
                `translate3d(${this.position.x}px, ${this.position.y}px, 0) scale(${this.lifeSpan / 120})`;
        };

        this.die = function () {
            this.element.remove();
        };
    }

    /* ===== 启动条件（桌面端） ===== */
    if (window.matchMedia('(min-width: 1200px)').matches) {
        init();
    }

})();
</script>

</body>
</html>
